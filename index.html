async function checkParrillaPublica(){
  const params = new URLSearchParams(window.location.search);
  const wsId = params.get("parrilla");
  if(!wsId) return false;

  // Modo parrilla pública — sin auth
  document.getElementById("loading-screen").style.display="none";
  const app = document.getElementById("app");

  const now = new Date();
  let mesActual = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

  function getMesLabel(mes){
    const [y,m]=mes.split("-").map(Number);
    return new Date(y,m-1,1).toLocaleDateString("es-MX",{month:"long",year:"numeric"});
  }
  function navMes(mes,delta){
    const [y,m]=mes.split("-").map(Number);
    const d=new Date(y,m-1+delta,1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }

  // Cargar nombre del workspace
  let wsName="";
  try{
    const wsDoc=await getDoc(doc(db,"workspaces",wsId));
    if(wsDoc.exists()) wsName=wsDoc.data().name||"";
  }catch(e){}

  async function renderParrillaPublica(mes){
    app.innerHTML=`<div style="min-height:100vh;background:var(--bg)">
      <!-- Header público -->
      <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="logo-text" style="font-size:20px">BRAVO CRM</div>
          <div class="text-sm text-muted">Parrilla de contenidos · ${wsName}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn-icon" id="pub-prev">◀</button>
          <span style="font-size:13px;font-weight:600;min-width:130px;text-align:center" id="pub-mes-label">${getMesLabel(mes).charAt(0).toUpperCase()+getMesLabel(mes).slice(1)}</span>
          <button class="btn-icon" id="pub-next">▶</button>
        </div>
      </div>
      <div style="padding:24px" id="pub-content">
        <div class="section-loading"><div class="spinner"></div></div>
      </div>
    </div>`;

    document.getElementById("pub-prev").onclick=()=>renderParrillaPublica(navMes(mes,-1));
    document.getElementById("pub-next").onclick=()=>renderParrillaPublica(navMes(mes,1));

    // Cargar piezas
    let piezas=[];
    try{
      const snap=await getDocs(query(
        collection(db,"workspaces",wsId,"contenidos"),
        where("mes","==",mes)
      ));
      piezas=snap.docs.map(d=>({id:d.id,...d.data(),wsId}));
      piezas.sort((a,b)=>{
        const da=new Date((a.fecha||"2000-01-01")+"T"+(a.hora||"00:00"));
        const db2=new Date((b.fecha||"2000-01-01")+"T"+(b.hora||"00:00"));
        return da-db2;
      });
    }catch(e){}

    const porFecha={};
    piezas.forEach(p=>{ const k=p.fecha||"Sin fecha"; if(!porFecha[k]) porFecha[k]=[]; porFecha[k].push(p); });

    const totalAprobados=piezas.filter(p=>p.status==="aprobado").length;
    const totalPendientes=piezas.filter(p=>p.status==="pendiente"||p.status==="revision").length;
    const totalComentarios=piezas.filter(p=>p.comentarioCliente).length;

    const pubContent=document.getElementById("pub-content");
    if(!pubContent) return;

    if(piezas.length===0){
      pubContent.innerHTML=`<div class="empty-state">${ico("calendar")}<h3>Sin contenidos este mes</h3><p>La programación aparecerá aquí cuando esté lista.</p></div>`;
      return;
    }

    pubContent.innerHTML=`
    <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="metric-card"><div class="metric-label">Total piezas</div><div class="metric-value">${piezas.length}</div></div>
      <div class="metric-card"><div class="metric-label">Aprobadas</div><div class="metric-value" style="color:var(--success)">${totalAprobados}</div></div>
      <div class="metric-card"><div class="metric-label">Pendientes</div><div class="metric-value" style="color:var(--warning)">${totalPendientes}</div></div>
    </div>
    ${Object.entries(porFecha).map(([fecha,pzs])=>{
      const fechaLabel=fecha!=="Sin fecha"
        ? new Date(fecha+"T12:00:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"})
        : "Sin fecha";
      return `<div style="margin-bottom:32px">
        <div style="font-family:var(--font-head);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:16px">${fechaLabel}</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">
          ${pzs.map(p=>`
          <div class="card" style="padding:0;overflow:hidden;cursor:pointer;border-color:${p.status==="aprobado"?"var(--success)":p.status==="rechazado"?"var(--error)":"var(--border)"}" onclick="window._pubAbrirPieza('${p.id}')">
            <div style="position:relative">
              ${renderThumbnail(p)}
              <div style="position:absolute;top:8px;left:8px">${formatoBadge(p.tipo)}</div>
              <div style="position:absolute;top:8px;right:8px">${redIcon(p.red)}</div>
            </div>
            <div style="padding:12px">
              ${p.hora?`<div class="text-sm text-muted" style="margin-bottom:4px">${p.hora}</div>`:""}
              <div style="font-weight:700;font-size:13px;line-height:1.3;margin-bottom:6px">${p.titulo||p.descripcion||"Sin título"}</div>
              <div style="margin-top:4px">${redIcon(p.red,true)}</div>
              <div style="margin-top:8px;font-size:11px;font-weight:700;color:${statusColor(p.status)}">${statusLabel(p.status)}</div>
              ${p.comentarioCliente?`<div style="margin-top:6px;font-size:11px;color:var(--warning);background:var(--surface-el);border-radius:4px;padding:4px 8px">💬 ${p.comentarioCliente.slice(0,50)}</div>`:""}
            </div>
          </div>`).join("")}
        </div>
      </div>`;
    }).join("")}`;

    // Guardar piezas para viewer
    window._pubPiezas=piezas;
    window._pubAbrirPieza=(pid)=>{
      const p=window._pubPiezas.find(x=>x.id===pid);
      if(p) openViewerPublico(p);
    };
  }

  await renderParrillaPublica(mesActual);
  return true;
}

function openViewerPublico(p){
  // Viewer público con opción de aprobar/comentar (guarda en Firestore)
  const isVideo=p.mediaType==="video";
  const ratio=p.tipo==="Story"||p.tipo==="Reel"?"9/16":"4/5";
  const allMedia=(p.mediaUrls&&p.mediaUrls.length>1)?p.mediaUrls:(p.mediaUrl?[{url:p.mediaUrl,type:p.mediaType}]:[]);

  const ov=document.createElement("div"); ov.className="modal-overlay"; ov.style.zIndex="9999";
  ov.innerHTML=`<div style="background:var(--surface);border-radius:var(--r-lg);max-width:420px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--border)">
    <div class="modal-header">
      <div>
        <div style="display:flex;gap:8px;margin-bottom:4px">${formatoBadge(p.tipo)} ${redIcon(p.red,true)}</div>
        <div class="font-head font-800" style="font-size:15px">${p.titulo||p.descripcion||""}</div>
        <div class="text-sm text-muted">${p.fecha||""} ${p.hora?"· "+p.hora:""}</div>
      </div>
      <button class="btn-icon" id="vpub-close">${ico("x")}</button>
    </div>
    <div style="padding:0 16px">
      ${allMedia.length===0
        ? p.tipo==="Pendiente"
          ? `<div style="width:100%;aspect-ratio:${ratio};background:#f59e0b11;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--warning);gap:8px"><div style="font-size:32px">📋</div><div style="font-weight:700">Contenido pendiente</div></div>`
          : `<div style="width:100%;aspect-ratio:${ratio};background:var(--surface-el);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted)">Sin archivo</div>`
        : allMedia.length===1
          ? allMedia[0].type==="video"
            ? `<video src="${allMedia[0].url}" style="width:100%;aspect-ratio:${ratio};object-fit:cover;border-radius:8px" controls></video>`
            : `<img src="${allMedia[0].url}" style="width:100%;aspect-ratio:${ratio};object-fit:cover;border-radius:8px" />`
          : `<div style="position:relative;overflow:hidden;border-radius:8px" id="pub-car">
              <div id="pub-car-track" style="display:flex;transition:transform .3s ease">
                ${allMedia.map(m=>m.type==="video"
                  ? `<div style="flex:0 0 100%"><video src="${m.url}" style="width:100%;aspect-ratio:${ratio};object-fit:cover" controls></video></div>`
                  : `<div style="flex:0 0 100%"><img src="${m.url}" style="width:100%;aspect-ratio:${ratio};object-fit:cover" /></div>`).join("")}
              </div>
              <button onclick="(function(){var t=document.getElementById('pub-car-track');var i=Math.max(0,(parseInt(t.dataset.idx||0)-1));t.dataset.idx=i;t.style.transform='translateX(-'+i*100+'%)'})()" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);background:#000a;border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px">‹</button>
              <button onclick="(function(){var t=document.getElementById('pub-car-track');var i=Math.min(${allMedia.length-1},(parseInt(t.dataset.idx||0)+1));t.dataset.idx=i;t.style.transform='translateX(-'+i*100+'%)'})()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#000a;border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px">›</button>
            </div>`}
    </div>
    <div style="padding:16px">
      ${p.descripcion?`<div class="stat-row"><span class="stat-key">Descripción</span><span class="stat-val">${p.descripcion}</span></div>`:""}
      ${p.copy?`<div style="margin-top:12px"><div class="form-label mb-2">Copy</div><div style="background:var(--surface-el);border-radius:var(--r);padding:12px;font-size:13px;line-height:1.6">${p.copy}</div></div>`:""}
      <div style="margin-top:16px">
        <div class="form-label" style="margin-bottom:6px">Tu comentario</div>
        <textarea class="form-textarea" id="vpub-comentario" placeholder="Escribe tu aprobación o solicitud de cambio…" style="min-height:70px">${p.comentarioCliente||""}</textarea>
        <div class="flex gap-2 mt-2">
          <button class="btn btn-primary" style="flex:1" id="vpub-aprobar">✓ Aprobar</button>
          <button class="btn btn-danger btn-sm" id="vpub-rechazar">✕ Solicitar cambio</button>
        </div>
      </div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  document.getElementById("vpub-close").onclick=close;
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });

  async function accion(status){
    const comentario=document.getElementById("vpub-comentario").value;
    try{
      await updateDoc(doc(db,"workspaces",p.wsId,"contenidos",p.id),{
        status, comentarioCliente:comentario, revisadoEn:serverTimestamp()
      });
      toast(status==="aprobado"?"✓ Pieza aprobada":"Cambio solicitado","success");
      close();
      // Refrescar
      window._pubPiezas=window._pubPiezas.map(x=>x.id===p.id?{...x,status,comentarioCliente:comentario}:x);
    }catch(e){ toast("Error al guardar","error"); }
  }
  document.getElementById("vpub-aprobar").onclick=()=>accion("aprobado");
  document.getElementById("vpub-rechazar").onclick=()=>accion("rechazado");
}

onAuthStateChanged(auth, async user=>{
  // Verificar si es parrilla pública
  if(await checkParrillaPublica()) return;
  if(!user){ S.user=null; S.profile=null; hideLoading(); render(); return; }
  S.user=user;
  try{
    const pd=await getDoc(doc(db,"users",user.uid));
    if(pd.exists()){ S.profile={id:pd.id,...pd.data()}; }
    else{
      const basic={email:user.email,role:"cliente",name:user.displayName||user.email,creadoEn:serverTimestamp()};
      await setDoc(doc(db,"users",user.uid),basic);
      S.profile={id:user.uid,...basic};
    }
  }catch(e){ S.profile={id:user.uid,email:user.email,role:"cliente"}; }

  try{
    if(isAdmin()){
      const snap=await getDocs(collection(db,"workspaces"));
      S.workspaces=snap.docs.map(d=>({id:d.id,...d.data()}));
      S.currentWorkspace=S.workspaces[0]||null;
      S.section="panel-agencia";
    } else if(S.profile.workspaceId){
      const wd=await getDoc(doc(db,"workspaces",S.profile.workspaceId));
      if(wd.exists()){ S.workspaces=[{id:wd.id,...wd.data()}]; S.currentWorkspace=S.workspaces[0]; }
      S.section="dashboard";
    }
  }catch(e){ console.error("Error workspaces",e); }

  try{
    const cd=await getDoc(doc(db,"config","marca"));
    if(cd.exists()&&cd.data().primary) document.documentElement.style.setProperty("--primary",cd.data().primary);
  }catch(e){}

  hideLoading(); render();
  // Cargar notificaciones de contenidos para admin
  if(S.profile?.role==="admin") setTimeout(cargarNotifContenidos, 1500);
});

async function cargarNotifContenidos(){
  try{
    let total=0;
    for(const ws of S.workspaces){
      const snap=await getDocs(query(
        collection(db,"workspaces",ws.id,"contenidos"),
        where("comentarioCliente","!=","")
      ));
      total+=snap.docs.filter(d=>{
        const data=d.data();
        return data.comentarioCliente && !data.vistoPorAdmin;
      }).length;
    }
    const badge=document.getElementById("notif-badge");
    if(badge){
      if(total>0){ badge.textContent=total; badge.style.display="inline-block"; }
      else { badge.style.display="none"; }
    }
  }catch(e){}
}
</script>
