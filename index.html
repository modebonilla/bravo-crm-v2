<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bravo CRM Lite v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#e8ff47;--primary-dark:#c8dc20;
  --bg:#0d0d0d;--surface:#161616;--surface-el:#1e1e1e;--border:#2a2a2a;
  --text:#f5f5f5;--text-sec:#a0a0a0;--text-muted:#606060;
  --success:#22c55e;--warning:#f59e0b;--error:#ef4444;--info:#3b82f6;
  --font-head:"Syne",sans-serif;--font-body:"DM Sans",sans-serif;--font-mono:"JetBrains Mono",monospace;
  --r:8px;--r-lg:16px;--sidebar:240px;--topbar:60px;--tr:150ms ease;
}
html,body,#app{height:100%;min-height:100%}
body{font-family:var(--font-body);font-size:14px;line-height:1.6;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,h6{font-family:var(--font-head);font-weight:700;line-height:1.2}
a{color:var(--primary);text-decoration:none}
button,input,select,textarea{font-family:var(--font-body)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* LAYOUT */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:200;transition:transform .3s ease;overflow-y:auto}
.sidebar-overlay{display:none;position:fixed;inset:0;background:#000a;z-index:199;cursor:pointer}
.main-content{flex:1;display:flex;flex-direction:column;margin-left:var(--sidebar);overflow:hidden}
.topbar{height:var(--topbar);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.page-content{flex:1;overflow-y:auto;padding:24px}

/* SIDEBAR */
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--primary);letter-spacing:-.5px}
.logo-sub{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:8px 12px 4px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);color:var(--text-sec);cursor:pointer;font-size:13px;font-weight:500;transition:all var(--tr);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface-el);color:var(--text)}
.nav-item.active{background:var(--primary);color:#000}
.nav-item svg{flex-shrink:0;width:16px;height:16px}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:6px;align-items:center}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;position:relative;overflow:hidden}
.metric-card::before{content:"";position:absolute;left:0;top:0;height:100%;width:3px;background:var(--primary);border-radius:2px 0 0 2px}
.metric-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.metric-value{font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--text);line-height:1}
.metric-value.hi{color:var(--primary)}
.metric-sub{font-size:12px;color:var(--text-muted);margin-top:6px}

/* PROGRESS BAR */
.progress-wrap{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;border-radius:4px;background:var(--primary);transition:width .5s ease}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:600;transition:all var(--tr);white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--primary);color:#000}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-secondary{background:var(--surface-el);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-sec)}
.btn-ghost:hover{background:var(--surface-el);color:var(--text)}
.btn-danger{background:var(--error);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-sm{font-size:12px;padding:6px 12px}
.btn-lg{font-size:15px;padding:13px 24px;width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-icon{padding:7px;background:var(--surface-el);border:1px solid var(--border);border-radius:var(--r);color:var(--text-sec);cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{color:var(--text);border-color:var(--text-muted)}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-sec)}
.form-label .req{color:var(--error);margin-left:3px}
.form-input,.form-select,.form-textarea{background:var(--surface-el);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;padding:10px 14px;transition:border-color var(--tr);width:100%;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px #e8ff4720}
.form-select{cursor:pointer}
.form-textarea{min-height:90px;resize:vertical}
.form-error{color:var(--error);font-size:12px}
.form-hint{color:var(--text-muted);font-size:12px}
.form-row{display:grid;gap:16px;grid-template-columns:1fr 1fr}

/* TABLE */
.table-wrap{border:1px solid var(--border);border-radius:var(--r-lg);overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--surface)}
thead{background:var(--surface-el)}
th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:10px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text-sec);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-el);color:var(--text)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.5px}
.badge-fb{background:#1877f226;color:#4b9ef5}
.badge-ig{background:#e1306c26;color:#f06292}
.badge-wa{background:#25d36626;color:#25d366}
.badge-success{background:#22c55e26;color:var(--success)}
.badge-error{background:#ef444426;color:var(--error)}
.badge-warning{background:#f59e0b26;color:var(--warning)}
.badge-primary{background:#e8ff4726;color:var(--primary)}
.badge-muted{background:#a0a0a026;color:var(--text-sec)}
.badge-info{background:#3b82f626;color:var(--info)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:#000c;backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);max-width:540px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--font-head);font-size:17px;font-weight:700}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:16px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end}

/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--surface-el);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 32px #0008;font-size:14px;font-weight:500;max-width:360px;animation:slideIn .2s ease}
.toast-success{border-left:3px solid var(--success);color:var(--success)}
.toast-error{border-left:3px solid var(--error);color:var(--error)}
.toast-info{border-left:3px solid var(--info);color:var(--info)}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px}
.page-title{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--text)}
.page-subtitle{font-size:12px;color:var(--text-muted);margin-top:3px}

/* GRIDS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* LOGIN */
.login-page{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.login-page::before{content:"";position:absolute;width:600px;height:600px;background:radial-gradient(circle,#e8ff4710 0%,transparent 70%);top:-20%;right:-15%;border-radius:50%;pointer-events:none}
.login-page::after{content:"";position:absolute;width:400px;height:400px;background:radial-gradient(circle,#e8ff4708 0%,transparent 70%);bottom:-10%;left:-10%;border-radius:50%;pointer-events:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px;width:100%;max-width:420px;position:relative;z-index:1}
.login-brand{margin-bottom:32px;text-align:center}
.login-brand .logo{font-family:var(--font-head);font-size:24px;font-weight:800;color:var(--primary)}
.login-brand .tagline{font-size:12px;color:var(--text-muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.login-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px}
.login-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted)}
.login-switch a{color:var(--primary);cursor:pointer}

/* ROAS */
.roas-display{background:var(--surface-el);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;text-align:center}
.roas-number{font-family:var(--font-head);font-size:56px;font-weight:800;color:var(--primary);line-height:1}
.roas-label{font-size:13px;color:var(--text-muted);margin-top:8px;letter-spacing:1px;text-transform:uppercase}

/* STAT ROW */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-key{font-size:13px;color:var(--text-muted)}
.stat-val{font-size:13px;font-weight:600;color:var(--text)}

/* SECTION TITLE */
.section-title{font-family:var(--font-head);font-size:14px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* AVATAR */
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0}
.avatar-lg{width:44px;height:44px;font-size:16px}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface-el);border-radius:var(--r);padding:4px;width:fit-content;margin-bottom:20px}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all var(--tr);border:none;background:none}
.tab.active{background:var(--primary);color:#000;font-weight:700}

/* CHIP */
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;background:var(--surface-el);border:1px solid var(--border);font-size:12px;font-weight:500}

/* RANKING */
.ranking-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.ranking-item:last-child{border-bottom:none}
.ranking-num{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);width:20px;flex-shrink:0}
.ranking-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:6px;overflow:hidden}
.ranking-bar{height:100%;background:var(--primary);border-radius:4px}

/* EMPTY & LOADING */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;color:var(--text-muted)}
.empty-state svg{opacity:.3;margin-bottom:16px;width:40px;height:40px}
.empty-state h3{font-size:15px;color:var(--text-sec);margin-bottom:6px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.section-loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text-muted)}

/* FILTERS */
.filters-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:20px}
.filters-bar .form-group{flex:1;min-width:140px;max-width:220px}

/* COLOR PICKER */
.color-swatch{width:32px;height:32px;border-radius:6px;border:2px solid var(--border);cursor:pointer;transition:border-color var(--tr)}
.color-swatch.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary)40}

/* UTILITIES */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}
.text-primary{color:var(--primary)}.text-muted{color:var(--text-muted)}.text-sec{color:var(--text-sec)}.text-success{color:var(--success)}.text-error{color:var(--error)}.text-warning{color:var(--warning)}
.font-mono{font-family:var(--font-mono)}.font-head{font-family:var(--font-head)}.font-bold{font-weight:700}.font-800{font-weight:800}
.w-full{width:100%}.text-sm{font-size:12px}.text-lg{font-size:16px}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hidden{display:none!important}.divider{height:1px;background:var(--border);margin:16px 0}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main-content{margin-left:0}
  .hamburger{display:flex}
  .page-content{padding:16px}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .login-card{padding:28px 20px}
  .modal{max-width:100%}
  .page-header{flex-direction:column}
  .roas-number{font-size:40px}
  .filters-bar .form-group{flex:1 1 calc(50% - 6px);max-width:100%}
}
@media(max-width:480px){
  .metrics-grid{grid-template-columns:1fr}
  .filters-bar .form-group{flex:1 1 100%}
}

/* ── CRM KANBAN ── */
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;min-height:400px}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);min-width:250px;max-width:270px;flex-shrink:0;display:flex;flex-direction:column}
.kanban-col-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.kanban-col-title{font-family:var(--font-head);font-size:13px;font-weight:700}
.kanban-col-count{font-size:11px;color:var(--text-muted);background:var(--surface-el);border-radius:100px;padding:2px 8px}
.kanban-col-body{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto}
.kanban-card{background:var(--surface-el);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:all var(--tr)}
.kanban-card:hover{border-color:var(--text-muted);transform:translateY(-1px)}
.kanban-card-name{font-weight:700;font-size:13px;margin-bottom:4px}
.kanban-card-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.kanban-card-monto{font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--primary)}

/* ── CALENDARIO DE CONTENIDOS ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border-radius:var(--r-lg);overflow:hidden}
.cal-header-day{background:var(--surface-el);padding:8px 4px;text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
.cal-cell{background:var(--surface);min-height:90px;padding:6px;position:relative;vertical-align:top}
.cal-cell.otro-mes{background:#0d0d0d;opacity:.4}
.cal-cell.hoy{background:#e8ff4708;outline:1px solid var(--primary)}
.cal-day-num{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px}
.cal-day-num.hoy-num{color:var(--primary)}
.cal-pieza{border-radius:4px;margin-bottom:3px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.cal-pieza:hover{opacity:.8}
.cal-pieza-thumb{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.cal-pieza-thumb-video{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#111}
.cal-pieza-label{font-size:9px;font-weight:700;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-pieza-empty{width:100%;aspect-ratio:1/1;background:var(--surface-el);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:18px}
@media(max-width:600px){
  .cal-cell{min-height:60px;padding:3px}
  .cal-day-num{font-size:9px}
  .cal-pieza-label{display:none}
}

/* Parrilla responsive */
@media(max-width:600px){
  #parrilla-content [style*="grid-template-columns"]{
    grid-template-columns:repeat(2,1fr)!important
  }
}
@media(max-width:380px){
  #parrilla-content [style*="grid-template-columns"]{
    grid-template-columns:1fr!important
  }
}
@media(min-width:769px){
  .main-content{margin-left:var(--sidebar)}
}
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <p style="color:var(--text-muted);font-size:13px;margin-top:8px">Iniciando Bravo CRM…</p>
  </div>
</div>
<div id="toast-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {

  storageBucket: "bravo-crm-lite.firebasestorage.app",
  messagingSenderId: "555637970627",
  appId: "1:555637970627:web:cdd9be3ec2c80132de7476",
  measurementId: "G-PEGZ0MNPKT"

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);

// ─────────────────────────────────────────

// ─────────────────────────────────────────
let S = {
  user: null,
  profile: null,
  workspaces: [],
  currentWorkspace: null,
  section: "panel-agencia",
  sidebarOpen: false,
};

const fmtMXN = n => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN"}).format(n||0);
const fmtDate = ts => {
  if(!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"});
};
const initials = (s="") => s.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";
const isAdmin  = () => S.profile?.role === "admin";
const getWsId  = () => isAdmin() ? S.currentWorkspace?.id||null : S.profile?.workspaceId||null;

function toast(msg, type="success"){
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${type==="success"?"✓":type==="error"?"✕":"ℹ"}</span><span>${msg}</span>`;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}
const showLoading = () => document.getElementById("loading-screen").style.display = "flex";
const hideLoading = () => document.getElementById("loading-screen").style.display = "none";

function canalBadge(c="", otroCual=""){
  const rl=(c||"").toLowerCase();
  const map={
    facebook:{cls:"badge-fb",icon:"f"},
    instagram:{cls:"badge-ig",icon:"ig"},
    tiktok:{cls:"",icon:"tt",style:"background:#00f2ea26;color:#00f2ea"},
    google:{cls:"",icon:"g",style:"background:#ea433526;color:#ea4335"},
    referido:{cls:"badge-muted",icon:"ref"},
    otro:{cls:"badge-muted",icon:"otro"},
  };
  const d=map[rl]||{cls:"badge-muted",icon:c};
  const label=rl==="otro"&&otroCual ? `Otro: ${otroCual}` : (c.charAt(0).toUpperCase()+c.slice(1)||"—");
  return `<span class="badge ${d.cls}" ${d.style?`style="${d.style}"`:""}>${label}</span>`;
}
function rolBadge(r){
  return r==="admin"
    ? `<span class="badge badge-primary">Admin</span>`
    : `<span class="badge badge-muted">Cliente</span>`;
}
function statusBadge(s){
  const map={pendiente:"badge-warning",aprobado:"badge-success",rechazado:"badge-error",publicado:"badge-info",revision:"badge-muted"};
  return `<span class="badge ${map[s]||"badge-muted"}">${s||"—"}</span>`;
}

function renderLogin(){
  return `<div class="login-page"><div class="login-card" id="login-card">
    <div class="login-brand"><div class="logo">BRAVO CRM</div><div class="tagline">Resultados que se ven</div></div>
    <div id="auth-panel">${loginForm()}</div>
  </div></div>`;
}
function loginForm(){
  return `<div class="login-title">Bienvenido</div>
  <div class="login-sub">Ingresa con tu cuenta</div>
  <div class="flex flex-col gap-4">
    <div class="form-group"><label class="form-label">Correo</label><input class="form-input" id="l-email" type="email" placeholder="hola@bravo.mx" /></div>
    <div class="form-group"><label class="form-label">Contraseña</label><input class="form-input" id="l-pass" type="password" placeholder="••••••••" /></div>
    <button class="btn btn-primary btn-lg" id="btn-login">Entrar</button>
  </div>
  <div class="login-switch"><a id="btn-forgot">¿Olvidaste tu contraseña?</a></div>`;
}
function forgotForm(){
  return `<div class="login-title">Recuperar acceso</div>
  <div class="login-sub">Te enviamos un link a tu correo</div>
  <div class="flex flex-col gap-4">
    <div class="form-group"><label class="form-label">Correo</label><input class="form-input" id="r-email" type="email" placeholder="hola@bravo.mx" /></div>
    <button class="btn btn-primary btn-lg" id="btn-reset">Enviar link</button>
  </div>
  <div class="login-switch"><a id="btn-back">← Regresar</a></div>`;
}
function bindLogin(){
  document.getElementById("btn-forgot")?.addEventListener("click",()=>{
    document.getElementById("auth-panel").innerHTML = forgotForm();
    document.getElementById("btn-reset").addEventListener("click", doReset);
    document.getElementById("btn-back").addEventListener("click",()=>{
      document.getElementById("auth-panel").innerHTML = loginForm();
      bindLoginActions();
    });
  });
  bindLoginActions();
}
function bindLoginActions(){
  document.getElementById("btn-login")?.addEventListener("click", doLogin);
  document.getElementById("l-pass")?.addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
}
async function doLogin(){
  const email = document.getElementById("l-email").value.trim();
  const pass  = document.getElementById("l-pass").value;
  const btn   = document.getElementById("btn-login");
  if(!email||!pass){ toast("Completa todos los campos","error"); return; }
  btn.disabled=true; btn.textContent="Ingresando…";
  const timeout = setTimeout(()=>{
    btn.disabled=false; btn.textContent="Entrar";
    toast("No se pudo conectar. Revisa tu internet e intenta de nuevo.","error");
  }, 8000);
  try{
    await signInWithEmailAndPassword(auth, email, pass);
    clearTimeout(timeout);
  } catch(e){
    clearTimeout(timeout);
    btn.disabled=false; btn.textContent="Entrar";
    const msg = e.code==="auth/wrong-password"||e.code==="auth/user-not-found"||e.code==="auth/invalid-credential"
      ? "Correo o contraseña incorrectos"
      : e.code==="auth/too-many-requests"
      ? "Demasiados intentos. Espera unos minutos."
      : e.code==="auth/network-request-failed"
      ? "Sin conexión. Revisa tu internet."
      : "Error al ingresar. Intenta de nuevo.";
    toast(msg,"error");
  }
}
async function doReset(){
  const email = document.getElementById("r-email").value.trim();
  if(!email){ toast("Ingresa tu correo","error"); return; }
  try{ await sendPasswordResetEmail(auth, email); toast("Link enviado, revisa tu correo","success"); }
  catch(e){ toast("Error al enviar el correo","error"); }
}

function bindShell(){
  document.getElementById("hamburger")?.addEventListener("click", toggleSidebar);
  document.getElementById("sidebar-overlay")?.addEventListener("click", closeSidebar);
  document.querySelectorAll("[data-section]").forEach(btn=>{
    btn.addEventListener("click",()=>{ S.section=btn.dataset.section; closeSidebar(); updateNav(); renderSection(S.section); });
  });
  document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth));
  document.getElementById("ws-switcher")?.addEventListener("change",e=>{
    S.currentWorkspace = S.workspaces.find(w=>w.id===e.target.value)||null;
    renderSection(S.section);
  });
  document.getElementById("btn-ver-ws")?.addEventListener("click",()=>{
    S.section="dashboard"; updateNav(); renderSection("dashboard");
  });
}

function toggleSidebar(){
  S.sidebarOpen=!S.sidebarOpen;
  document.getElementById("sidebar")?.classList.toggle("open",S.sidebarOpen);
  document.getElementById("sidebar-overlay")?.classList.toggle("open",S.sidebarOpen);
}
function closeSidebar(){
  S.sidebarOpen=false;
  document.getElementById("sidebar")?.classList.remove("open");
  document.getElementById("sidebar-overlay")?.classList.remove("open");
}
function updateNav(){
  document.querySelectorAll("[data-section]").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.section===S.section);
  });
}

const TITLES = {
  "panel-agencia":"Panel de Agencia","dashboard":"Dashboard",
  "registrar-venta":"Registrar Venta","mis-ventas":"Mis Ventas",
  roas:"ROAS Calculator","contenidos":"Programación de Contenidos",
  workspaces:"Workspaces","usuarios":"Usuarios",
  "todas-ventas":"Todas las Ventas","configuracion":"Configuración de Marca","metricas":"Métricas de Campaña","prospectos":"CRM de Prospectos"
};

async function renderSection(sec){
  const el = document.getElementById("section-content");
  if(!el) return;
  const title = document.getElementById("topbar-title");
  if(title) title.textContent = TITLES[sec]||sec;
  el.innerHTML = `<div class="section-loading"><div class="spinner"></div></div>`;
  try{
    switch(sec){
      case "panel-agencia":    await secPanelAgencia(el); break;
      case "dashboard":        await secDashboard(el); break;
      case "registrar-venta":  await secRegistrarVenta(el); break;
      case "mis-ventas":       await secMisVentas(el); break;
      case "roas":             await secROAS(el); break;
      case "metricas":         await secMetricas(el); break;
      case "prospectos":       await secProspectos(el); break;
      case "contenidos":       await secContenidos(el); break;
      case "workspaces":       await secWorkspaces(el); break;
      case "usuarios":         await secUsuarios(el); break;
      case "todas-ventas":     await secTodasVentas(el); break;
      case "configuracion":    await secConfiguracion(el); break;
      default: el.innerHTML=`<div class="empty-state"><h3>Sección no encontrada</h3></div>`;
    }
  }catch(err){
    console.error(err);
    el.innerHTML=`<div class="empty-state"><h3>Error cargando</h3><p style="font-size:12px;margin-top:4px">${err.message}</p></div>`;
  }
}

// HELPERS DE GRÁFICAS (SVG nativo, sin dependencias)
// ─────────────────────────────────────────
function graficaBarras(datos, titulo=""){
  // datos = [{label, valor, color}]
  if(!datos.length||datos.every(d=>d.valor===0)) return `<div class="empty-state" style="padding:24px"><h3>Sin datos para graficar</h3></div>`;
  const max=Math.max(...datos.map(d=>d.valor))||1;
  const w=300, h=160, pad=40, barW=Math.min(40, (w-pad*2)/datos.length - 8);
  const svgBars = datos.map((d,i)=>{
    const bh=Math.round(((d.valor/max)*(h-pad)));
    const x=pad+(i*(w-pad*2)/datos.length)+((w-pad*2)/datos.length-barW)/2;
    const y=h-pad-bh;
    return `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" fill="${d.color||"#e8ff47"}" rx="3"/>
      <text x="${x+barW/2}" y="${h-pad+14}" text-anchor="middle" fill="#606060" font-size="10" font-family="DM Sans,sans-serif">${d.label}</text>
      <text x="${x+barW/2}" y="${y-4}" text-anchor="middle" fill="#f5f5f5" font-size="9" font-family="DM Sans,sans-serif">${fmtMXN(d.valor).replace("$","$")}</text>`;
  }).join("");
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px;display:block;margin:0 auto">
    <line x1="${pad}" y1="${pad/2}" x2="${pad}" y2="${h-pad}" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad/2}" y2="${h-pad}" stroke="#2a2a2a" stroke-width="1"/>
    ${svgBars}
  </svg></div>`;
}

function graficaPastel(datos, titulo=""){
  if(!datos.length||datos.every(d=>d.valor===0)) return `<div class="empty-state" style="padding:24px"><h3>Sin datos</h3></div>`;
  const total=datos.reduce((a,d)=>a+d.valor,0)||1;
  const cx=80,cy=80,r=65;
  let angle=-Math.PI/2;
  const slices=datos.map(d=>{
    const sweep=(d.valor/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return {path:`M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} Z`,color:d.color,label:d.label,pct:Math.round((d.valor/total)*100)};
  }).filter(s=>!isNaN(parseFloat(s.path.split("L")[1])));
  const leyenda=datos.map(d=>`<div class="flex items-center gap-2 text-sm"><div style="width:10px;height:10px;border-radius:2px;background:${d.color};flex-shrink:0"></div><span class="text-muted">${d.label}</span><span class="font-bold" style="margin-left:auto">${Math.round((d.valor/total)*100)}%</span></div>`).join("");
  return `<div class="flex gap-4 items-center flex-wrap">
    <svg viewBox="0 0 160 160" style="width:130px;flex-shrink:0">
      ${slices.map(s=>`<path d="${s.path}" fill="${s.color}" stroke="#161616" stroke-width="1.5"/>`).join("")}
    </svg>
    <div class="flex flex-col gap-2" style="flex:1;min-width:120px">${leyenda}</div>
  </div>`;
}

function graficaLinea(puntos, titulo=""){
  // puntos = [{label, valor}]
  if(!puntos.length||puntos.every(p=>p.valor===0)) return `<div class="empty-state" style="padding:16px"><h3>Sin datos</h3></div>`;
  const max=Math.max(...puntos.map(p=>p.valor))||1;
  const w=300,h=120,padX=40,padY=20;
  const pts=puntos.map((p,i)=>({
    x:padX+i*((w-padX*2)/(puntos.length-1||1)),
    y:padY+(1-p.valor/max)*(h-padY*2),
    label:p.label,valor:p.valor
  }));
  const polyline=pts.map(p=>`${p.x},${p.y}`).join(" ");
  const area=`${pts[0].x},${h-padY} `+pts.map(p=>`${p.x},${p.y}`).join(" ")+` ${pts[pts.length-1].x},${h-padY}`;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;display:block">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8ff47" stop-opacity=".3"/><stop offset="100%" stop-color="#e8ff47" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#lg)"/>
    <polyline points="${polyline}" fill="none" stroke="#e8ff47" stroke-width="2" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#e8ff47"/>
      <text x="${p.x}" y="${h-4}" text-anchor="middle" fill="#606060" font-size="9" font-family="DM Sans,sans-serif">${p.label}</text>`).join("")}
  </svg>`;
}

const CANALES_COLORS={facebook:"#1877f2",instagram:"#e1306c",tiktok:"#00f2ea",google:"#ea4335",referido:"#a0a0a0",otro:"#606060"};
const CANALES_LIST=["facebook","instagram","tiktok","google","referido","otro"];

function calcMetricas(ventas){
  const total=ventas.reduce((a,v)=>a+(v.monto||0),0);
  const ticket=ventas.length?total/ventas.length:0;
  const porCanal={};
  CANALES_LIST.forEach(c=>{ porCanal[c]=ventas.filter(v=>(v.canal||"").toLowerCase()===c).reduce((a,v)=>a+(v.monto||0),0); });
  // Por mes (últimos 6)
  const now=new Date();
  const porMes=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const mesKey=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const label=d.toLocaleDateString("es-MX",{month:"short"});
    const val=ventas.filter(v=>{
      if(!v.fecha) return false;
      const vd=v.fecha.toDate?v.fecha.toDate():new Date(v.fecha);
      return `${vd.getFullYear()}-${String(vd.getMonth()+1).padStart(2,"0")}`===mesKey;
    }).reduce((a,v)=>a+(v.monto||0),0);
    porMes.push({label,valor:val});
  }
  return {total,ticket,porCanal,porMes};
}

function lanzarConfeti(){
  const colors=["#e8ff47","#ffffff","#22c55e","#3b82f6","#f59e0b"];
  for(let i=0;i<120;i++){
    const el=document.createElement("div");
    const size=Math.random()*10+6;
    el.style.cssText=`position:fixed;top:-20px;left:${Math.random()*100}vw;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?"50%":"2px"};z-index:9999;pointer-events:none;opacity:1;transition:none`;
    document.body.appendChild(el);
    const dur=Math.random()*2000+1500;
    const drift=(Math.random()-0.5)*200;
    el.animate([
      {transform:`translate(0,0) rotate(0deg)`,opacity:1},
      {transform:`translate(${drift}px,110vh) rotate(${Math.random()*720}deg)`,opacity:0}
    ],{duration:dur,easing:"cubic-bezier(0.25,0.46,0.45,0.94)",delay:Math.random()*600}).onfinish=()=>el.remove();
  }
}

async function secMisVentas(el){

  let ventas=[];
  try{
    const snap=await getDocs(query(
      collection(db,"workspaces",wsId,"ventas"),
      where("vendedorId","==",S.user.uid),
      orderBy("fecha","desc")
    ));
    ventas=snap.docs.map(d=>({id:d.id,...d.data(),wsId}));
  }catch(e){ el.innerHTML=`<div class="empty-state"><h3>Error cargando ventas</h3><p>${e.message}</p></div>`; return; }

  let fCanal="",fDesde="",fHasta="",fProducto="",fCampana="";

    return ventas.filter(v=>{
      if(fCanal && (v.canal||"").toLowerCase()!==fCanal) return false;

  el.innerHTML=`

function exportCSV(ventas){
  const conWA = ventas.filter(v=>v.whatsapp&&v.whatsapp.replace(/[^0-9]/g,"").length>=10);
  if(!conWA.length){ toast("Sin ventas con WhatsApp para exportar","error"); return; }
  const rows = conWA.map(v=>{
    let tel = (v.whatsapp||"").replace(/[^0-9]/g,"");
    if(tel.length===10) tel = "52"+tel;
    tel = "+"+tel;
    const fecha = v.fecha&&v.fecha.toDate ? v.fecha.toDate() : new Date(v.fecha||Date.now());
    const unixTs = Math.floor(fecha.getTime()/1000);
    return ["Purchase",unixTs,(v.monto||0).toFixed(2),"MXN",tel].join(",");
  });
  const csv = ["event_name,event_time,value,currency,phone",...rows].join("
");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download = "meta-offline-"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
  toast(conWA.length+" eventos exportados para Meta","success");
}

function roasClasificacion(r){
  if(r<2)  return {label:"Malo",       color:"#ef4444", emoji:"🔴"};
  if(r<3)  return {label:"Regular",    color:"#f59e0b", emoji:"🟠"};
  if(r<4)  return {label:"Aceptable",  color:"#eab308", emoji:"🟡"};
  if(r<5)  return {label:"Bueno",      color:"#22c55e", emoji:"🟢"};
  if(r<7)  return {label:"Muy bueno",  color:"#3b82f6", emoji:"🔵"};
  return   {label:"Excelente",         color:"#a855f7", emoji:"🟣"};
}

function roasTablaReferencia(){
  const filas=[
    {rango:"Menos de 2", cls:"badge-error",   label:"Malo"},
    {rango:"2 a 3",      cls:"badge-warning",  label:"Regular"},
    {rango:"3 a 4",      cls:"badge-primary",  label:"Aceptable"},
    {rango:"4 a 5",      cls:"badge-success",  label:"Bueno"},
    {rango:"5 a 7",      cls:"badge-info",     label:"Muy bueno"},
    {rango:"Más de 7",   cls:"",               label:"Excelente", style:"background:#a855f726;color:#a855f7"},
  ];
  return `<div class="section-title">Tabla de referencia</div>
  ${filas.map(f=>`<div class="stat-row">
    <span class="stat-key">${f.rango}</span>
    <span class="badge ${f.cls}" ${f.style?`style="${f.style}"`:""}>${f.label}</span>
  </div>`).join("")}`;
}

      </div>
    </div>
    <div class="flex flex-col gap-4">
      <div class="card">${roasTablaReferencia()}</div>
      <div class="card">
        <div class="section-title">Reportes publicados</div>
        <div id="roas-historial">
          ${reportes.length===0
            ? `<div class="empty-state" style="padding:24px"><h3>Sin reportes publicados</h3></div>`
            : reportes.map(r=>{
                const cls=roasClasificacion(parseFloat(r.roas));
                return `<div class="stat-row">
                  <div>
                    <div class="font-bold text-sm">${r.nombre||"Reporte"}</div>
                    <div class="text-sm text-muted">${r.periodo||fmtDate(r.creadoEn)}</div>
                  </div>
                  <div class="flex items-center gap-2">
                    <span style="font-family:var(--font-head);font-weight:800;color:${cls.color}">${r.roas}x</span>
                    <button class="btn-icon" onclick="window._delRoas('${wsId}','${r.id}')">${ico("trash")}</button>
                  </div>
                </div>`;
              }).join("")}
        </div>
      </div>
    </div>
  </div>`;

  let resultadoActual=null;

  document.getElementById("btn-calc-roas").addEventListener("click", async()=>{
    const inv    = parseFloat(document.getElementById("r-inv").value||0);
    const leads  = parseInt(document.getElementById("r-leads").value||0);
    const desde  = document.getElementById("r-desde").value;
    const hasta  = document.getElementById("r-hasta").value;
    if(!inv){ toast("Ingresa la inversión en Ads","error"); return; }

    const btn=document.getElementById("btn-calc-roas");
    btn.disabled=true; btn.innerHTML=`<div class="spinner" style="width:14px;height:14px"></div> Calculando…`;

    // Sumar ventas registradas del periodo automáticamente
    let ingresos=0, ventasContadas=0;
    try{
      const snap=await getDocs(query(collection(db,"workspaces",wsId,"ventas"),orderBy("fecha","desc")));
      const ventas=snap.docs.map(d=>d.data());
      const ventasFiltradas=ventas.filter(v=>{
        if(!desde&&!hasta) return true;
        const d=v.fecha?.toDate?.()||new Date(0);
        if(desde && d<new Date(desde)) return false;
        if(hasta && d>new Date(hasta+"T23:59:59")) return false;
        return true;
      });
      ingresos=ventasFiltradas.reduce((a,v)=>a+(v.monto||0),0);
      ventasContadas=ventasFiltradas.length;
    }catch(e){ toast("Error cargando ventas: "+e.message,"error"); }

    const roas = inv>0 ? (ingresos/inv).toFixed(2) : "0.00";
    const roi  = inv>0 ? (((ingresos-inv)/inv)*100).toFixed(1) : "0.0";
    const cls  = roasClasificacion(parseFloat(roas));

    resultadoActual={
      nombre: document.getElementById("r-nombre").value||"Reporte",
      periodo: document.getElementById("r-periodo").value||`${desde||""}${desde&&hasta?" – ":""}${hasta||""}`,
      inversion: inv, ingresos, roas, roi, leads, ventasContadas,
    };

    document.getElementById("roas-preview").innerHTML=`
    <div class="flex justify-between items-center mb-4">
      <div class="font-head font-800">${resultadoActual.nombre}</div>
      <span class="badge" style="background:${cls.color}26;color:${cls.color}">${cls.emoji} ${cls.label}</span>
    </div>
    <div class="roas-display mb-4" style="border-color:${cls.color}">
      <div class="roas-number" style="color:${cls.color}">${roas}x</div>
      <div class="roas-label">ROAS · Retorno en Ads</div>
    </div>
    <div class="stat-row"><span class="stat-key">Inversión en Ads</span><span class="stat-val">${fmtMXN(inv)}</span></div>
    <div class="stat-row"><span class="stat-key">Ingresos (${ventasContadas} ventas registradas)</span><span class="stat-val text-success">${fmtMXN(ingresos)}</span></div>
    <div class="stat-row"><span class="stat-key">ROI</span><span class="stat-val" style="color:${cls.color}">${roi}%</span></div>
    ${leads?`<div class="stat-row"><span class="stat-key">Leads</span><span class="stat-val">${leads}</span></div>`:""}`;

    btn.disabled=false; btn.innerHTML=`${ico("bar-chart")} Calcular`;
    document.getElementById("btn-pub-roas").disabled=false;
  });

  document.getElementById("btn-pub-roas").addEventListener("click", async()=>{
    if(!resultadoActual){ toast("Primero calcula el ROAS","error"); return; }
    const btn=document.getElementById("btn-pub-roas");
    btn.disabled=true; btn.textContent="Publicando…";
    try{
      await addDoc(collection(db,"workspaces",wsId,"roas_reportes"),{
        ...resultadoActual, creadoEn:serverTimestamp()
      });
      toast("✅ Reporte publicado al cliente","success");
      resultadoActual=null;
      secROAS(el);
    }catch(e){ toast("Error al publicar","error"); btn.disabled=false; btn.innerHTML=`${ico("check")} Publicar al cliente`; }
  });

  window._delRoas=async(wid,rid)=>{
    if(!confirm("¿Eliminar este reporte?")) return;
    await deleteDoc(doc(db,"workspaces",wid,"roas_reportes",rid));
    toast("Reporte eliminado","success"); secROAS(el);
  };
}

const CLOUDINARY_CLOUD = "dtbcj7i9x";
const CLOUDINARY_PRESET = "bravo-crm";

async function uploadToCloudinary(file){
  const isVideo = file.type.startsWith("video/");
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_PRESET);
  fd.append("folder", "bravo-crm");
  // Usar /auto/upload — funciona con preset unsigned para imagen y video
  const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`;
  let res;
  try{
    res = await fetch(url, {method:"POST", body:fd});
  } catch(e){
    throw new Error("Error de red: "+e.message);
  }
  let data;
  try{ data = await res.json(); } catch(e){ throw new Error("Respuesta inválida de Cloudinary"); }
  if(data.error) throw new Error("Cloudinary: "+data.error.message);
  if(!data.secure_url) throw new Error("No se recibió URL del archivo");
  return {url: data.secure_url, type: isVideo?"video":"image", publicId: data.public_id};
}

function formatoBadge(f){
  const map={Reel:"#ef4444",Imagen:"#3b82f6",Carrusel:"#f59e0b",Story:"#a855f7"};
  const color=map[f]||"#606060";
  return `<span style="background:${color};color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase">${f||"Post"}</span>`;
}
function redIcon(r, full=false){
  const rl=(r||"").toLowerCase();
  const map={
    instagram:{label:"Instagram",color:"#e1306c",bg:"#e1306c26",icon:"📷"},
    facebook:{label:"Facebook",color:"#1877f2",bg:"#1877f226",icon:"👍"},
    whatsapp:{label:"WhatsApp",color:"#25d366",bg:"#25d36626",icon:"💬"},
    youtube:{label:"YouTube",color:"#ff0000",bg:"#ff000026",icon:"▶️"},
  };
  const d=map[rl]||{label:r||"—",color:"#606060",bg:"#60606026",icon:"🌐"};
  if(full) return `<span style="background:${d.bg};color:${d.color};font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;display:inline-flex;align-items:center;gap:4px">${d.icon} ${d.label}</span>`;
  return `<span style="background:${d.bg};color:${d.color};font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px">${d.icon}</span>`;
}
function statusColor(s){
  return s==="aprobado"?"#22c55e":s==="rechazado"?"#ef4444":s==="publicado"?"#3b82f6":"#f59e0b";
}
function statusLabel(s){
  return s==="aprobado"?"✓ Aprobado":s==="rechazado"?"✕ Rechazado":s==="publicado"?"● Publicado":"○ Pendiente";
}

function renderThumbnail(p, size="card"){
  if(!p.mediaUrl) return `<div style="width:100%;aspect-ratio:${p.tipo==="Story"?"9/16":"1/1"};background:var(--surface-el);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px">${ico("image")}</div>`;

    const [y,m]=mes.split("-").map(Number);

  function navMes(mes,delta){
    const [y,m]=mes.split("-").map(Number);

    function renderCalendario(){
      const [year,month]=mes.split("-").map(Number);
      const diasEnMes=new Date(year,month,0).getDate();
      const primerDia=new Date(year,month-1,1);
      let startDow=primerDia.getDay(); startDow=startDow===0?6:startDow-1;
      const hoy=new Date();
      const hoyStr=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,"0")}-${String(hoy.getDate()).padStart(2,"0")}`;
      const diasPrev=[];
      const prevMonth=new Date(year,month-1,0);
      for(let i=startDow-1;i>=0;i--) diasPrev.push({d:prevMonth.getDate()-i,otro:true});
      let celdas=[...diasPrev];
      for(let d=1;d<=diasEnMes;d++) celdas.push({d,otro:false});
      while(celdas.length%7!==0) celdas.push({d:celdas.length-diasPrev.length-diasEnMes+1,otro:true});
      const diasSem=["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"];
      document.getElementById("parrilla-content").innerHTML=`<div class="cal-grid">
        ${diasSem.map(d=>`<div class="cal-header-day">${d}</div>`).join("")}
        ${celdas.map(({d,otro})=>{
          const dateStr=otro?"":` ${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`.trim();
          const esHoy=dateStr===hoyStr;
          const pzsDia=otro?[]:piezas.filter(p=>p.fecha===dateStr);
          return `<div class="cal-cell ${otro?"otro-mes":""} ${esHoy?"hoy":""}">
            <div class="cal-day-num ${esHoy?"hoy-num":""}">${d}</div>
            ${pzsDia.slice(0,3).map(p=>`
              <div class="cal-pieza" title="${p.titulo||""}" onclick="window._abrirPieza('${p.id}')">
                ${p.tipo==="Pendiente"
                  ? `<div class="cal-pieza-empty" style="background:#f59e0b22;font-size:10px;color:var(--warning);padding:4px">📋 ${(p.titulo||"Pendiente").slice(0,12)}</div>`
                  : p.mediaUrl
                    ? p.mediaType==="video"
                      ? `<video class="cal-pieza-thumb-video" src="${p.mediaUrl}" preload="none"></video>`
                      : `<img class="cal-pieza-thumb" src="${p.mediaUrl}" loading="lazy" />`
                    : `<div class="cal-pieza-empty">${p.tipo==="Reel"||p.tipo==="Story"?"🎬":"🖼️"}</div>`}
                <div class="cal-pieza-label" style="background:${statusColor(p.status)}22;color:${statusColor(p.status)}">${p.titulo||p.tipo||"—"}</div>
              </div>`).join("")}
            ${pzsDia.length>3?`<div style="font-size:9px;color:var(--text-muted);text-align:center">+${pzsDia.length-3} más</div>`:""}
            <div style="text-align:center;margin-top:2px">
              <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1" title="Agregar pieza" onclick="event.stopPropagation();window._addPiezaFecha('${dateStr}')">+</button>
            </div>
          </div>`;
        }).join("")}
      </div>`;
    }

    // Render inicial
    if(!isAdmin()){
      renderLista();
    } else {
      renderCalendario();
      document.getElementById("vista-tabs")?.querySelectorAll(".tab").forEach(t=>{
        t.addEventListener("click",()=>{
          document.querySelectorAll("#vista-tabs .tab").forEach(x=>x.classList.remove("active"));
          t.classList.add("active");
          if(t.dataset.vista==="calendario") renderCalendario();
          else renderLista();
        });
      });
    }

    // Navegación de meses
    document.getElementById("btn-mes-prev")?.addEventListener("click",()=>cargarYRenderizar(navMes(mes,-1)));
    document.getElementById("btn-mes-next")?.addEventListener("click",()=>cargarYRenderizar(navMes(mes,1)));

    document.getElementById("btn-copiar-link")?.addEventListener("click",()=>{
      const url=`${window.location.origin}${window.location.pathname}?parrilla=${wsId}`;
      navigator.clipboard.writeText(url).then(()=>toast("✓ Enlace copiado — compártelo con tu cliente","success"));
    });
    document.getElementById("btn-nueva-pieza")?.addEventListener("click",()=>{
      openModalPieza(wsId,mes,()=>cargarYRenderizar(mes),null,null);
    });

    window._abrirPieza=(pid)=>{ const p=window._piezasActuales.find(x=>x.id===pid); if(p) openViewer(p); };
    window._editPieza=(pid)=>{ const p=window._piezasActuales.find(x=>x.id===pid); if(p) openModalPieza(wsId,mes,()=>cargarYRenderizar(mes),p,null); };
    window._addPiezaFecha=(fecha)=>openModalPieza(wsId,mes,()=>cargarYRenderizar(mes),null,fecha);
    window._delPieza=async(wid,pid)=>{
      if(!confirm("¿Eliminar esta pieza?")) return;
      await deleteDoc(doc(db,"workspaces",wid,"contenidos",pid));
      toast("Eliminada","success"); cargarYRenderizar(mes);
    };
  }

  await cargarYRenderizar(mesActual);
}

function openModalPieza(wsId, mes, cb, piezaEditar=null, fechaPreset=null){
  const isEdit=!!piezaEditar;
  const p=piezaEditar||{};
  let mediaData = p.mediaUrl ? [{url:p.mediaUrl,type:p.mediaType,publicId:p.mediaPublicId}] : [];
  // Para carrusel con múltiples imágenes
  if(p.mediaUrls && p.mediaUrls.length) mediaData = p.mediaUrls;

  const ov=document.createElement("div"); ov.className="modal-overlay";
  ov.innerHTML=`<div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">${isEdit?"Editar":"Nueva"} pieza de contenido</div>
      <button class="btn-icon" id="mc-close">${ico("x")}</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Título <span class="req">*</span></label>
          <input class="form-input" id="mc-titulo" value="${p.titulo||""}" placeholder="ej. Mañanas productivas" /></div>
        <div class="form-group"><label class="form-label">Fecha de publicación</label>
          <input class="form-input" id="mc-fecha" type="date" value="${p.fecha||fechaPreset||""}" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Hora</label>
          <input class="form-input" id="mc-hora" type="time" value="${p.hora||"09:00"}" /></div>
        <div class="form-group"><label class="form-label">Red Social</label>
          <select class="form-select" id="mc-red">
            ${["instagram","facebook","whatsapp","youtube"].map(r=>`<option value="${r}" ${p.red===r?"selected":""}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join("")}
          </select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Formato</label>
          <select class="form-select" id="mc-tipo">
            ${["Reel","Imagen","Carrusel","Story","Pendiente"].map(t=>`<option ${p.tipo===t?"selected":""}>${t}</option>`).join("")}
          </select></div>
        <div class="form-group"><label class="form-label">Estado</label>
          <select class="form-select" id="mc-status">
            ${[{v:"revision",l:"En revisión"},{v:"pendiente",l:"Pendiente"},{v:"aprobado",l:"Aprobado"},{v:"publicado",l:"Publicado"}]
              .map(s=>`<option value="${s.v}" ${p.status===s.v?"selected":""}>${s.l}</option>`).join("")}
          </select></div>
      </div>
      <div class="form-group"><label class="form-label">Descripción / Tema</label>
        <textarea class="form-textarea" id="mc-desc" style="min-height:70px">${p.descripcion||""}</textarea></div>
      <div class="form-group"><label class="form-label">Copy / Caption</label>
        <textarea class="form-textarea" id="mc-copy" style="min-height:80px">${p.copy||""}</textarea></div>
      <div class="form-group" id="archivo-section">
        <label class="form-label">Archivo(s) <span class="text-muted" id="archivo-hint">(imagen o video)</span></label>
        <div id="upload-zone" style="border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer" onclick="document.getElementById('mc-file').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();window._handleDrop(event.dataTransfer.files)">
          <div id="upload-preview" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:60px;align-items:center">
            ${mediaData.length>0
              ? mediaData.map((m,i)=>m.type==="video"
                  ? `<video src="${m.url}" style="height:80px;border-radius:6px" controls></video>`
                  : `<img src="${m.url}" style="height:80px;border-radius:6px;object-fit:cover" />`).join("")
              : `<div>${ico("download")}<div class="text-sm text-muted mt-2">Arrastra o clic para subir</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">MP4, MOV, JPG, PNG · máx 100MB</div></div>`}
          </div>
          <input type="file" id="mc-file" accept="image/*,video/*" style="display:none" multiple />
        </div>
        <div id="upload-progress" style="display:none;margin-top:8px">
          <div style="background:var(--border);border-radius:4px;height:4px"><div id="upload-bar" style="background:var(--primary);height:100%;width:0%;border-radius:4px;transition:width .3s"></div></div>
          <div class="text-sm text-muted mt-1" id="upload-status">Subiendo…</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="mc-cancel">Cancelar</button>
      <button class="btn btn-primary" id="mc-save">${ico("check")} ${isEdit?"Actualizar":"Publicar pieza"}</button>
    </div>
  </div>`;
  document.body.appendChild(ov);

  // Mostrar hint según formato
  function updateHint(){
    const tipo=document.getElementById("mc-tipo").value;
    const hint=document.getElementById("archivo-hint");
    const input=document.getElementById("mc-file");
    if(tipo==="Carrusel"){ hint.textContent="(selecciona múltiples imágenes)"; input.multiple=true; }
    else if(tipo==="Pendiente"){ hint.textContent="(opcional — solo idea/estrategia)"; input.multiple=false; }
    else { hint.textContent="(imagen o video)"; input.multiple=false; }
  }
  document.getElementById("mc-tipo").addEventListener("change",updateHint);
  updateHint();

  const close=()=>ov.remove();
  document.getElementById("mc-close").onclick=close;
  document.getElementById("mc-cancel").onclick=close;
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });

  async function handleFiles(files){
    const arr=Array.from(files);
    if(!arr.length) return;
    const prog=document.getElementById("upload-progress");
    const bar=document.getElementById("upload-bar");
    const status=document.getElementById("upload-status");
    const preview=document.getElementById("upload-preview");
    prog.style.display="block"; status.textContent=`Subiendo ${arr.length} archivo(s)…`;
    const tipo=document.getElementById("mc-tipo").value;
    // Si no es carrusel, solo tomar el primero
    const toUpload = tipo==="Carrusel" ? arr : [arr[0]];
    const results=[];
    for(let i=0;i<toUpload.length;i++){
      bar.style.width=`${Math.round(((i+0.5)/toUpload.length)*100)}%`;
      status.textContent=`Subiendo ${i+1} de ${toUpload.length}…`;
      try{
        const r=await uploadToCloudinary(toUpload[i]);
        results.push(r);
      }catch(e){ status.textContent="Error: "+e.message; return; }
    }
    mediaData=results;
    bar.style.width="100%"; status.textContent=`✓ ${results.length} archivo(s) listos`;
    preview.innerHTML=results.map(r=>r.type==="video"
      ? `<video src="${r.url}" style="height:80px;border-radius:6px" controls></video>`
      : `<img src="${r.url}" style="height:80px;border-radius:6px;object-fit:cover" />`).join("");
  }

  document.getElementById("mc-file").addEventListener("change",e=>handleFiles(e.target.files));
  window._handleDrop=(files)=>handleFiles(files);

  document.getElementById("mc-save").onclick=async()=>{
    const titulo=document.getElementById("mc-titulo").value.trim();
    if(!titulo){ toast("El título es requerido","error"); return; }
    const btn=document.getElementById("mc-save"); btn.disabled=true; btn.textContent="Guardando…";
    const tipo=document.getElementById("mc-tipo").value;
    // Para carrusel guardamos array; para otros, primer elemento
    const data={
      mes, titulo, tipo,
      fecha: document.getElementById("mc-fecha").value||"",
      hora: document.getElementById("mc-hora").value||"",
      red: document.getElementById("mc-red").value,
      status: document.getElementById("mc-status").value,
      descripcion: document.getElementById("mc-desc").value,
      copy: document.getElementById("mc-copy").value,
      // Un solo archivo (compatibilidad)
      mediaUrl: mediaData[0]?.url||"",
      mediaType: mediaData[0]?.type||"",
      mediaPublicId: mediaData[0]?.publicId||"",
      // Array para carrusel
      mediaUrls: mediaData.length>1 ? mediaData : [],
      updatedAt: serverTimestamp(),
    };
    try{
      if(isEdit){
        await updateDoc(doc(db,"workspaces",wsId,"contenidos",piezaEditar.id),data);
        toast("Pieza actualizada","success");
      } else {
        await addDoc(collection(db,"workspaces",wsId,"contenidos"),{...data,creadoPor:S.user.uid,creadoEn:serverTimestamp()});
        toast("¡Pieza publicada!","success");
      }
      close(); cb&&cb();
    }catch(e){ toast("Error: "+e.message,"error"); btn.disabled=false; btn.textContent=isEdit?"Actualizar":"Publicar pieza"; }
  };
}

// CRM DE PROSPECTOS
// ─────────────────────────────────────────
const ETAPAS = [
  {id:"prospecto",   label:"Prospecto",   color:"#3b82f6"},
  {id:"contactado",  label:"Contactado",  color:"#f59e0b"},
  {id:"negociando",  label:"Negociando",  color:"#a855f7"},
  {id:"ganado",      label:"Ganado",      color:"#22c55e"},
];

async function secProspectos(el){
  const wsId=getWsId();
  if(!wsId){ el.innerHTML=emptyWs(); return; }
  el.innerHTML=`<div class="section-loading"><div class="spinner"></div></div>`;

  let prospectos=[];
  try{
    const snap=await getDocs(query(collection(db,"workspaces",wsId,"prospectos"),orderBy("creadoEn","desc")));
    prospectos=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){}

  function renderBoard(){
    const board=document.getElementById("kanban-board");
    if(!board) return;
    board.innerHTML=ETAPAS.map(etapa=>{
      const cards=prospectos.filter(p=>p.etapa===etapa.id);
      const total=cards.reduce((a,p)=>a+(p.monto||0),0);
      return `<div class="kanban-col">
        <div class="kanban-col-header">
          <div class="flex items-center gap-2">
            <div style="width:8px;height:8px;border-radius:50%;background:${etapa.color}"></div>
            <span class="kanban-col-title">${etapa.label}</span>
          </div>
          <span class="kanban-col-count">${cards.length}</span>
        </div>
        ${total>0?`<div style="padding:6px 16px;font-size:11px;color:${etapa.color};font-weight:700;border-bottom:1px solid var(--border)">${fmtMXN(total)}</div>`:""}
        <div class="kanban-col-body">
          ${cards.map(p=>`
          <div class="kanban-card" onclick="window._abrirProspecto('${p.id}')">
            <div class="kanban-card-name">${p.nombre||"Sin nombre"}</div>
            <div class="kanban-card-meta">${p.empresa||""} ${p.empresa&&p.canal?"·":""} ${p.canal||""}</div>
            ${p.monto?`<div class="kanban-card-monto">${fmtMXN(p.monto)}</div>`:""}
            ${p.notas?`<div style="font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.4">${p.notas.slice(0,60)}${p.notas.length>60?"…":""}</div>`:""}
            <div class="flex gap-1 mt-2" onclick="event.stopPropagation()">
              ${ETAPAS.filter(e=>e.id!==etapa.id).map(e=>`
              <button class="btn btn-sm" style="font-size:10px;padding:3px 7px;background:${e.color}22;color:${e.color};border:1px solid ${e.color}44" onclick="window._moverProspecto('${p.id}','${e.id}')" title="Mover a ${e.label}">→ ${e.label}</button>`).join("")}
            </div>
          </div>`).join("")||`<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">Sin prospectos</div>`}
          <button class="btn btn-ghost btn-sm w-full" style="margin-top:4px" onclick="window._nuevoProspecto('${etapa.id}')">+ Agregar</button>
        </div>
      </div>`;
    }).join("");
  }

  el.innerHTML=`
  <div class="page-header">
    <div><div class="page-title">CRM de Prospectos</div>
    <div class="page-subtitle">${prospectos.length} prospectos · ${fmtMXN(prospectos.filter(p=>p.etapa==="ganado").reduce((a,p)=>a+(p.monto||0),0))} ganados</div></div>
    <button class="btn btn-primary" onclick="window._nuevoProspecto('prospecto')">${ico("plus")} Nuevo prospecto</button>
  </div>
  <div class="kanban-board" id="kanban-board"></div>`;

  renderBoard();

  window._moverProspecto=async(pid,etapa)=>{
    const p=prospectos.find(x=>x.id===pid);
    if(!p) return;
    // Si se mueve a "ganado", preguntar si convertir a venta
    if(etapa==="ganado"){
      await updateDoc(doc(db,"workspaces",wsId,"prospectos",pid),{etapa,updatedAt:serverTimestamp()});
      p.etapa=etapa;
      renderBoard();
      // Preguntar si crear venta
      if(confirm(`¿Convertir a "${p.nombre}" en una venta registrada?`)){
        try{
          await addDoc(collection(db,"workspaces",wsId,"ventas"),{
            canal: p.canal||"otro",
            producto: p.servicio||"Prospecto convertido",
            monto: p.monto||0,
            cliente: p.nombre||"",
            whatsapp: p.whatsapp||"",
            notas: `Convertido desde CRM. ${p.notas||""}`,
            fecha: Timestamp.fromDate(new Date()),
            vendedorId: S.user.uid,
            vendedorEmail: S.user.email,
            creadoEn: serverTimestamp(),
          });
          toast("🎉 ¡Venta registrada automáticamente!","success");
          lanzarConfeti();
        }catch(e){ toast("Error al crear venta: "+e.message,"error"); }
      }
    } else {
      await updateDoc(doc(db,"workspaces",wsId,"prospectos",pid),{etapa,updatedAt:serverTimestamp()});
      p.etapa=etapa; renderBoard();
    }
  };

  window._abrirProspecto=(pid)=>{
    const p=prospectos.find(x=>x.id===pid);
    if(p) openModalProspecto(wsId,p,()=>secProspectos(el));
  };

  window._nuevoProspecto=(etapa)=>{
    openModalProspecto(wsId,{etapa},()=>secProspectos(el));
  };
}

async function secWorkspaces(el){
  if(!isAdmin()){ el.innerHTML=`<div class="empty-state"><h3>Acceso restringido</h3></div>`; return; }
  const snap=await getDocs(collection(db,"workspaces"));
  S.workspaces=snap.docs.map(d=>({id:d.id,...d.data()}));

  el.innerHTML=`
  <div class="page-header">
    <div><div class="page-title">Workspaces</div><div class="page-subtitle">${S.workspaces.length} clientes</div></div>
    <button class="btn btn-primary" id="btn-nuevo-ws">${ico("plus")} Nuevo Workspace</button>
  </div>
  <div class="grid-3" id="ws-grid">
    ${S.workspaces.length===0
      ? `<div class="empty-state" style="grid-column:1/-1">${ico("briefcase")}<h3>Sin workspaces</h3><p>Crea el primero.</p></div>`
      : S.workspaces.map(w=>`
      <div class="card" id="ws-card-${w.id}">
        <div class="flex items-center gap-3 mb-4">
          ${w.logo?`<img src="${w.logo}" style="width:40px;height:40px;border-radius:8px;object-fit:cover" />`:`<div class="avatar avatar-lg" style="border-radius:8px">${initials(w.name)}</div>`}
          <div><div class="font-head font-800">${w.name}</div><div class="text-sm text-muted">${w.cliente||"Sin cliente"}</div></div>
        </div>
        <div class="stat-row"><span class="stat-key">Total vendido</span><span class="stat-val text-primary" id="ws-total-${w.id}">…</span></div>
        <div class="stat-row"><span class="stat-key">Más vendido</span><span class="stat-val truncate" style="max-width:160px" id="ws-top-${w.id}">…</span></div>
        <div class="flex gap-2 mt-4">
          <button class="btn btn-secondary btn-sm" onclick="window._editWs('${w.id}')">${ico("edit")} Editar</button>
          <button class="btn btn-ghost btn-sm" onclick="window._verDashWs('${w.id}')">${ico("eye")} Ver</button>
          <button class="btn-icon" onclick="window._delWs('${w.id}')">${ico("trash")}</button>
        </div>
      </div>`).join("")}
  </div>`;

  document.getElementById("btn-nuevo-ws").addEventListener("click",()=>openModalWs(null,()=>renderSection("workspaces")));
  window._editWs=(id)=>openModalWs(S.workspaces.find(w=>w.id===id),()=>renderSection("workspaces"));
  window._verDashWs=(id)=>{ S.currentWorkspace=S.workspaces.find(w=>w.id===id)||null; S.section="dashboard"; updateNav(); renderSection("dashboard"); };
  window._delWs=async(id)=>{
    if(!confirm("¿Eliminar workspace?")) return;
    await deleteDoc(doc(db,"workspaces",id));
    toast("Eliminado","success"); renderSection("workspaces");
  };

  // Cargar totales y producto top por workspace en paralelo
  S.workspaces.forEach(async w=>{
    try{
      const snap=await getDocs(collection(db,"workspaces",w.id,"ventas"));
      const ventas=snap.docs.map(d=>d.data());
      const total=ventas.reduce((a,v)=>a+(v.monto||0),0);
      const freq={};
      ventas.forEach(v=>{ if(v.producto) freq[v.producto]=(freq[v.producto]||0)+1; });
      const top=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";
      const elTotal=document.getElementById("ws-total-"+w.id);
      const elTop=document.getElementById("ws-top-"+w.id);
      if(elTotal) elTotal.textContent=fmtMXN(total);
      if(elTop) elTop.textContent=top;
    }catch(e){}
  });
}
